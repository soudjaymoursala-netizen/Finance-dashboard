<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>Dashboard Financier</h1>
        <div class="badge">Données Live</div>
    </header>

    <section class="kpi-grid">

        <div class="card">
            <h3>Patrimoine total</h3>
            <span>0 €</span>
        </div>

        <div class="card">
            <h3>Investissements</h3>
            <span>0 €</span>
        </div>

        <div class="card">
            <h3>Cash</h3>
            <span>0 €</span>
        </div>

        <div class="card">
            <h3>Performance</h3>
            <span>0 %</span>
        </div>

    </section>

</div>

</body>
</html>
