<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>💰 Finance Dashboard</h1>
            <span class="status">LIVE</span>
        </div>

        <div class="kpi-grid">

            <div class="card">
                <div class="label">Patrimoine total</div>
                <div class="value" id="networth">...</div>
            </div>

            <div class="card">
                <div class="label">Cash</div>
                <div class="value" id="cash">...</div>
            </div>

            <div class="card">
                <div class="label">PEA</div>
                <div class="value" id="pea">...</div>
            </div>

            <div class="card">
                <div class="label">CTO</div>
                <div class="value" id="cto">...</div>
            </div>

            <div class="card">
                <div class="label">Investissements</div>
                <div class="value" id="investments">...</div>
            </div>

            <div class="card">
                <div class="label">Taux d'épargne</div>
                <div class="value" id="performance">...</div>
            </div>

        </div>

        <div class="chart-card" style="margin-top:30px;">
            <h2>📈 Évolution du patrimoine</h2>
            <div id="patrimoineChart"></div>
        </div>

        <div class="chart-card" style="margin-top:30px;">
            <h2>🥧 Allocation du patrimoine</h2>
            <div id="allocationChart"></div>
        </div>

        <div class="chart-card" style="margin-top:30px;">
            <h2>🎯 Objectifs financiers</h2>

            <div id="goalsContainer">

                <div class="goal">
                    <div class="goal-header">
                        <span>🏠 Appartement</span>
                        <span id="goal-appartement">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="bar-appartement" class="progress-fill"></div>
                    </div>
                </div>

                <div class="goal">
                    <div class="goal-header">
                        <span>🚗 Voiture</span>
                        <span id="goal-voiture">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="bar-voiture" class="progress-fill"></div>
                    </div>
                </div>

                <div class="goal">
                    <div class="goal-header">
                        <span>✈️ Vacances</span>
                        <span id="goal-vacances">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="bar-vacances" class="progress-fill"></div>
                    </div>
                </div>

                <div class="goal">
                    <div class="goal-header">
                        <span>💰 Fonds urgence</span>
                        <span id="goal-fonds_urgence">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="bar-fonds_urgence" class="progress-fill"></div>
                    </div>
                </div>

                <div class="goal">
                    <div class="goal-header">
                        <span>🎯 Patrimoine 250k</span>
                        <span id="goal-patrimoine_total">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="bar-patrimoine_total" class="progress-fill"></div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="js/charts.js"></script>
  <script>
window.onerror = function(message){
    alert("ERRE

</body>

</html>
